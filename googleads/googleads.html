<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Google Ads - Campanhas</title>
    <link rel="icon" type="image/png" href="../images/googleads.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <a href="../index.html" class="btn-voltar">Voltar à Homepage</a>

    <div class="container">
        <a href="https://docs.google.com/spreadsheets/d/1gtAfosi0rEHigy7fndS-m1ol2J6jogjL8iwak3apKKk/edit?usp=sharing"
            target="_blank" style="text-decoration: none; color: inherit;">
            <h1>Calculadora de Custos de Campanhas</h1>
        </a>
        <form id="form-custos">
            <div class="input-group">
                <label for="RPASaoPaulo">RPA #1 - São Paulo:</label>
                <input type="text" id="RPASaoPaulo">
            </div>
            <div class="input-group">
                <label for="MobileSiteAgence">Mobile Site Agence:</label>
                <input type="text" id="MobileSiteAgence">
            </div>
            <div class="input-group">
                <label for="HuntingOutsourcing">Hunting e Outsourcing:</label>
                <input type="text" id="HuntingOutsourcing">
            </div>
            <div class="input-group">
                <label for="PMaxSaoPaulo">PMax #1 - São Paulo:</label>
                <input type="text" id="PMaxSaoPaulo">
            </div>
            <div class="input-group">
                <label for="SistemasWeb">Sistemas Web:</label>
                <input type="text" id="SistemasWeb">
            </div>
            <div class="input-group">
                <label for="YoutubeAgence">Youtube Agence Consultoria Out. 2023:</label>
                <input type="text" id="YoutubeAgence">
            </div>
            <div class="input-group">
                <label for="Ajustes">Ajustes:</label>
                <input type="text" id="Ajustes">
            </div>
            <div class="botao-centralizado">
                <button type="button" onclick="calcularTotais()">Calcular Totais</button>
            </div>
        </form>
        <div id="resultados">
            <!-- Os resultados serão exibidos aqui -->
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
